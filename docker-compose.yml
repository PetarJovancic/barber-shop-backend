services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber
      POSTGRES_DB: barber_shop
    ports:
      - "5410:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber -d barber_shop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
